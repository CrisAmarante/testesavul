<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PENSO - Prancheta Eletrônica</title>
    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css?v=20260331">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<!-- vConsole - Console móvel para depuração -->
<script src="https://cdn.jsdelivr.net/npm/vconsole@3.15.1/dist/vconsole.min.js"></script>
<script>
  // Inicializa apenas se estiver em modo de teste (pode ativar por URL)
  if (window.location.search.includes('debug=true') || localStorage.getItem('debugMode') === 'true') {
    var vConsole = new VConsole();
    console.log('🐛 Modo debug ativado!');
  }
  
  // Para ativar sem recarregar, pode usar este atalho:
  window.ativarDebug = function() {
    if (typeof VConsole !== 'undefined' && !window.vConsoleInstance) {
      window.vConsoleInstance = new VConsole();
      localStorage.setItem('debugMode', 'true');
      console.log('🐛 Console ativado!');
    }
  };
</script>
<body>

<button id="theme-toggle" class="theme-toggle" aria-label="Alternar tema">🌙</button>

<div id="aviso-temporario" class="banner">
    <div><strong>ATENÇÃO</strong><br>Período de inspeções 5S da frota Osasco iniciado.</div>
    <button id="btn-fechar-banner" class="banner-close">×</button>
</div>

<h1 class="titulo"><i class="fas fa-clipboard-list"></i> PENSO - Prancheta Eletrônica</h1>

<!-- TELA INICIAL (NÃO LOGADA) -->
<div id="main-screen" class="screen-container">
    <div class="grid-panel">
        <div class="cards-grid">
            <a href="#" id="btn-segunda-tela" class="card card-inspetores"><div class="card-icon"><i class="fa-solid fa-key"></i></div>Área logada</a>
        </div>
    </div>
</div>

<!-- TELA DE INSPETORES (LOGADA) -->
<div id="inspector-screen" class="screen-container" style="display: none;">
    <div class="grid-panel">
        <div class="cards-grid">
            <a href="#" id="btn-envio-informacoes" class="inspector-card" style="display: none;"><div class="card-icon"><i class="fas fa-paper-plane"></i></div>Envio de Informações</a>
        </div>
    </div>
    <button onclick="logoutInspector()" class="logout-btn">Sair</button>
</div>

<!-- TOAST -->
<div id="welcome-toast"><div>Bem-vindo, <span id="toast-name" class="toast-name"></span>!</div><button class="toast-close" onclick="hideWelcomeToast()">×</button></div>

<!-- MODAL DE LOGIN -->
<div id="modal-login" class="modal"><div class="modal-content"><div class="modal-header"><h2 class="modal-title">🔐 Área logada</h2><button class="modal-close" onclick="window.modals.login.close()">×</button></div><form id="login-form"><input type="password" id="password" placeholder="Digite seu pin exclusivo" required><div id="login-error" style="color:#ff4d4d; text-align:center; margin:10px 0; display:none;">Senha incorreta!</div><button type="submit" class="button">Entrar</button></form></div></div>

<!-- MODAL ENVIO DE INFORMAÇÕES -->
<div id="modal-envio-informacoes" class="modal">
  <div class="modal-content envio-modal-content">
    <div class="modal-header"><h2 class="modal-title">📋 RELATÓRIO À CHEFIA DO TRÁFEGO</h2><button class="modal-close" onclick="fecharModalEnvio()">×</button></div>
    <form id="form-envio">
      <div class="form-section">
        <label>ÁREA DE DESTINO: <span class="required">*</span></label>
        <div class="radio-group" id="area-destino-group">
          <label><input type="radio" name="areaDestino" value="FISCALIZAÇÃO"> FISCALIZAÇÃO</label>
          <label><input type="radio" name="areaDestino" value="SAF"> SAF</label>
          <label><input type="radio" name="areaDestino" value="PLANTÃO"> PLANTÃO</label>
          <label><input type="radio" name="areaDestino" value="OUTRAS ÁREAS"> OUTRAS ÁREAS</label>
        </div>
        <div id="campo-outras-area" style="display: none; margin-top: 10px;">
          <input type="text" id="envio-outras-area" placeholder="Digite a área de destino (ex: Manutenção, Portaria, Seleção...)" style="width: 100%;">
        </div>
      </div>
      <div class="form-section">
        <label>MOTIVO: <span class="required">*</span></label>
        <div class="radio-group" id="motivo-group">
          <label><input type="radio" name="motivo" value="AVARIAS"> AVARIAS</label>
          <label><input type="radio" name="motivo" value="PEDIDO DE FOLGAS"> PEDIDO DE FOLGAS</label>
          <label><input type="radio" name="motivo" value="SOLICITAÇÃO DE MATERIAIS"> SOLICITAÇÃO DE MATERIAIS</label>
          <label><input type="radio" name="motivo" value="OUTROS"> OUTROS</label>
        </div>
        <div id="campo-outros-motivo" style="display: none; margin-top: 10px;">
          <input type="text" id="envio-outros-motivo" placeholder="Descreva o motivo resumidamente" style="width: 100%;">
        </div>
      </div>
      <div class="form-row" id="dados-veiculo">
        <div class="field"><label>CARRO</label><input type="text" id="envio-carro" placeholder="Carro"></div>
        <div class="field"><label>LINHA</label><input type="text" id="envio-linha" placeholder="Linha"></div>
        <div class="field"><label>MOT.</label><input type="text" id="envio-motorista" placeholder="Motorista"></div>
        <div class="field"><label>COB.</label><input type="text" id="envio-cobrador" placeholder="Cobrador"></div>
      </div>
      <div class="form-row" id="dados-hora-sentido">
        <div class="field"><label>HORA</label><input type="time" id="envio-hora"></div>
        <div class="field"><label>SENT.</label><input type="text" id="envio-sentido" placeholder="Ex: IDA, VOLTA. Garagem, etc..."></div>
      </div>
      <div class="form-section">
        <label>HISTÓRICO: <span id="historico-contador" style="font-size: 0.7rem; font-weight: normal;">(0/1400)</span></label>
        <div style="display: flex; gap: 8px; align-items: flex-start;">
         <textarea id="envio-historico" rows="4" placeholder="Descreva o ocorrido..." style="flex: 1;" maxlength="1400"></textarea>
          <button type="button" id="btn-microfone" class="btn-icon" title="Ditar histórico (microfone)">🎤</button>
        </div>
      </div>
      <div class="form-row">
        <div class="field"><label>LOCAL:</label><select id="envio-local"><option value="">Selecione...</option></select></div>
        <div class="field"><label>RESPONSÁVEL:</label><input type="text" id="envio-responsavel" readonly></div>
        <div class="field"><label>DATA:</label><input type="date" id="envio-data" max=""></div>
      </div>
      <div class="action-grid-container">
        <div class="action-row">
          <button type="button" id="btn-anexar" class="btn-secundario" onclick="anexarArquivos()">📎 ANEXAR (até 4)</button>
          <div id="lista-anexos" class="grid-anexos-preview">
            <small>Nenhum anexo selecionado (máx. 4)</small>
          </div>
        </div>
        <div class="action-row">
          <button type="button" id="btn-salvar-rascunho" class="btn-secundario">💾 SALVAR</button>
          <button type="button" id="btn-enviar-relatorio" class="btn-principal">📤 ENVIAR</button>
          <button type="button" id="btn-consultar-envios" class="btn-secundario">🔍 CONSULTAR ENVIOS</button>
        </div>
      </div>
    </form>
  </div>
</div>

<!-- MODAL LISTA DE ENVIOS -->
<div id="modal-lista-envios" class="modal"><div class="modal-content"><div class="modal-header"><h2 class="modal-title">📋 ENVIOS REALIZADOS</h2><button class="modal-close" onclick="fecharModalListaEnvios()">×</button></div><div id="lista-envios-container"></div></div></div>

<!-- MODAL DETALHE DO ENVIO -->
<div id="modal-detalhe-envio" class="modal modal-detalhe-envio">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title">📄 DETALHES DO RELATÓRIO</h2>
      <button class="modal-close" onclick="fecharModalDetalheEnvio()">×</button>
    </div>
    <div id="detalhe-envio-conteudo"></div>
  </div>
</div>

<script src="config.js"></script>
<script src="utils.js"></script>
<script src="api.js"></script>
<script src="auth.js"></script>
<script src="envio.js"></script>
<script src="main.js"></script>
</body>
</html>
